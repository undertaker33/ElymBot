name: CI

on:
  push:
    branches:
      - master
      - "codex/**"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  architecture:
    name: Architecture contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Verify Gradle wrapper
        run: ./gradlew --version --console=plain --no-daemon

      - name: Run architecture contracts
        run: ./gradlew architectureCheck --console=plain --no-daemon --stacktrace

  module-slices:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: architecture
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Core common and database
            gradle_tasks: >-
              :core:common:testDebugUnitTest
              :core:logging:testDebugUnitTest
              :core:db:testDebugUnitTest
          - name: Core runtime
            gradle_tasks: >-
              :core:runtime:testDebugUnitTest
          - name: Stable feature owners
            gradle_tasks: >-
              :feature:bot:api:testDebugUnitTest
              :feature:bot:impl:testDebugUnitTest
              :feature:config:api:testDebugUnitTest
              :feature:config:impl:testDebugUnitTest
              :feature:persona:api:testDebugUnitTest
              :feature:persona:impl:testDebugUnitTest
              :feature:provider:api:testDebugUnitTest
              :feature:provider:impl:testDebugUnitTest
              :feature:resource:api:testDebugUnitTest
              :feature:resource:impl:testDebugUnitTest
          - name: Chat and cron runtime
            gradle_tasks: >-
              :feature:chat:api:testDebugUnitTest
              :feature:chat:impl:testDebugUnitTest
              :feature:cron:api:testDebugUnitTest
              :feature:cron:impl:testDebugUnitTest
          - name: Plugin platform
            gradle_tasks: >-
              :feature:plugin:api:testDebugUnitTest
              :feature:plugin:impl:testDebugUnitTest
          - name: QQ runtime
            gradle_tasks: >-
              :feature:qq:api:testDebugUnitTest
              :feature:qq:impl:testDebugUnitTest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run module slice tests
        run: ./gradlew ${{ matrix.gradle_tasks }} --console=plain --no-daemon --stacktrace

  integration:
    name: App integration compile
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: module-slices

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Compile integration module
        run: ./gradlew :app-integration:compileDebugKotlin --console=plain --no-daemon --stacktrace

  app:
    name: App unit tests and debug assemble
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: integration

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run app unit tests
        run: ./gradlew :app:testDebugUnitTest --console=plain --no-daemon --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --console=plain --no-daemon --stacktrace
